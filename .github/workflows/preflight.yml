name: Preflight

# Asserts release-time org-policy preconditions before remediation
# commits land:
#   - branch-protection required-checks include the expected names
#   - GitHub Actions allowlist permits cosign + attest-build-provenance
#   - GHCR tag immutability is enabled for the published package
#
# Required as a branch-protection status check. Workflow / job name MUST
# remain stable across revisions ("Preflight" / "preflight") so branch
# protection does not silently detach (see plan §0 sequencing).

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read
  packages: read
  # Required for `gh api repos/<repo>/branches/<branch>/protection` —
  # without `administration: read` the API returns 403 and Check 1 reports
  # "branch protection not configured or insufficient API permissions"
  # even when the protection is correctly set up. Default GITHUB_TOKEN
  # does not include this scope.
  administration: read

jobs:
  preflight:
    name: preflight
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run preflight checks
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: bash scripts/preflight-checks.sh
