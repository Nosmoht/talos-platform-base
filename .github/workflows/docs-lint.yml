name: docs-lint

on:
  pull_request:
    paths:
      - '**/*.md'
      - '.markdownlint.yaml'
      - '.markdownlintignore'
      - '.github/workflows/docs-lint.yml'
  push:
    branches: [main]
    paths:
      - '**/*.md'
      - '.markdownlint.yaml'
      - '.markdownlintignore'

jobs:
  markdownlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install markdownlint-cli
        run: npm install -g markdownlint-cli@0.42.0

      - name: Lint Markdown
        run: markdownlint '**/*.md' --ignore-path .markdownlintignore

  capability-reference-fresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/download/v4.44.3/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Regenerate capability reference
        run: scripts/render-capability-reference.sh

      - name: Diff check
        run: |
          if ! git diff --exit-code docs/capability-reference.md; then
            echo "::error::docs/capability-reference.md is stale."
            echo "::error::Run scripts/render-capability-reference.sh and commit the result."
            exit 1
          fi
