name: GitOps Validate

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches: ["main"]

permissions:
  contents: read
  pull-requests: write

jobs:
  validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: sh
    env:
      # Tool versions — KEEP IN SYNC with .tool-versions at repo root.
      # The drift-check step below fails the workflow on mismatch.
      # .tool-versions is the single source of truth (asdf/mise format);
      # these env vars exist because GitHub Actions inputs cannot read
      # .tool-versions natively.
      KUSTOMIZE_VERSION: 5.3.0
      KUSTOMIZE_SHA256_LINUX_AMD64: 3ab32f92360d752a2a53e56be073b649abc1e7351b912c0fb32b960d1def854c
      CONFTEST_VERSION: v0.53.0
      KYVERNO_CLI_VERSION: v1.17.1
      KUBECONFORM_VERSION: 0.6.7
      HELM_VERSION: 3.20.2
      YQ_VERSION: 4.53.2

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify env tool-versions match .tool-versions
        # Drift-detector: the env block above and the .tool-versions file
        # must agree. If they diverge, render output may differ between
        # local and CI — exactly the class of failure rendered-manifests
        # migration needs to prevent.
        run: |
          set -eu
          fail=0
          assert() {
            tool="$1"; pinned_in_file="$2"; env_value="$3"; env_value_normalized="${env_value#v}"
            if [ "$pinned_in_file" != "$env_value_normalized" ]; then
              echo "DRIFT:    $tool .tool-versions=$pinned_in_file workflow-env=$env_value"
              fail=1
            else
              echo "OK:       $tool $pinned_in_file"
            fi
          }
          tv() { awk -v k="$1" '$1==k {print $2}' .tool-versions; }
          assert kustomize   "$(tv kustomize)"   "$KUSTOMIZE_VERSION"
          assert conftest    "$(tv conftest)"    "$CONFTEST_VERSION"
          assert kyverno-cli "$(tv kyverno-cli)" "$KYVERNO_CLI_VERSION"
          assert kubeconform "$(tv kubeconform)" "$KUBECONFORM_VERSION"
          assert helm        "$(tv helm)"        "$HELM_VERSION"
          assert yq          "$(tv yq)"          "$YQ_VERSION"
          [ "$fail" -eq 0 ] || { echo "::error::tool-version drift detected — sync .tool-versions and workflow env"; exit 1; }

      - name: Install ripgrep
        # scripts/render_kustomize_safe.sh uses `rg` for ksops/sops-generator
        # detection. Not preinstalled on ubuntu-latest GitHub runners as of
        # 2026-05; explicit install keeps the workflow self-contained.
        run: |
          set -eu
          if ! command -v rg >/dev/null 2>&1; then
            sudo apt-get update -qq
            sudo apt-get install -y --no-install-recommends ripgrep
          fi
          rg --version | head -1

      - name: Setup kustomize
        uses: kustomize-everything/action-kustomize@v2.1.0
        with:
          version: ${{ env.KUSTOMIZE_VERSION }}
          sha256-checksum: ${{ env.KUSTOMIZE_SHA256_LINUX_AMD64 }}

      - name: Verify kustomize install
        run: kustomize version --short

      - name: Setup conftest
        uses: princespaghetti/setup-conftest@v1.2.0
        with:
          version: ${{ env.CONFTEST_VERSION }}

      - name: Setup Kyverno CLI
        uses: kyverno/action-install-cli@v0.2.0
        with:
          release: ${{ env.KYVERNO_CLI_VERSION }}

      - name: Setup kubeconform
        uses: bmuschko/setup-kubeconform@v1.0.0
        with:
          kubeconform-version: ${{ env.KUBECONFORM_VERSION }}

      - name: Setup helm
        # Phase 0 of rendered-manifests migration: helm is the Stage-1
        # renderer for all Helm-based components in Phase B. Pinned to
        # .tool-versions to keep rendered output deterministic between
        # CI and local developer renders.
        uses: azure/setup-helm@v4
        with:
          version: v${{ env.HELM_VERSION }}

      - name: Verify helm install
        run: helm version --short

      - name: Install yq (pinned version)
        # render-component.sh + verify-rendered.sh use yq for chart.lock.yaml
        # parsing and CRD/manifest splitting. yq is not preinstalled on
        # ubuntu-latest GitHub runners. Pinned to .tool-versions because
        # multi-line block scalar serialization (`|` vs `|2`) differs
        # across yq versions and would produce verify-rendered drift.
        # Always download — ubuntu-latest sometimes ships a different yq.
        run: |
          set -eu
          sudo wget -q "https://github.com/mikefarah/yq/releases/download/v${YQ_VERSION}/yq_linux_amd64" -O /usr/local/bin/yq
          sudo chmod +x /usr/local/bin/yq
          installed="$(yq --version | awk '{print $NF}' | sed -E 's/^v//')"
          if [ "$installed" != "$YQ_VERSION" ]; then
            echo "::error::yq install version mismatch: installed=$installed expected=$YQ_VERSION"
            exit 1
          fi
          echo "OK: yq v$installed"

      - name: Verify rendered manifests are reproducible (drift gate)
        # Phase B re-render gate: re-runs scripts/render-component.sh for
        # every component with a chart.lock.yaml in a tmpdir and diffs
        # against the committed _rendered/ tree. Drift = build fails.
        # This is the load-bearing guarantee that committed _rendered/
        # YAML is reproducible from chart.lock.yaml + values.yaml +
        # _rendered-overlay/. Without this gate, a developer could
        # hand-edit the committed output and the change would silently
        # ship to consumer clusters.
        run: ./scripts/verify-rendered.sh

      - name: Discover kustomize targets
        run: ./scripts/discover_kustomize_targets.sh

      - name: Render safe kustomize targets
        run: ./scripts/render_kustomize_safe.sh

      - name: Verify rendered set matches .ci-renderable-components.txt
        run: |
          set -eu
          if [ ! -f .ci-renderable-components.txt ]; then
            echo "error: .ci-renderable-components.txt missing — frozen ground-truth list required"
            exit 1
          fi
          expected_file="$(mktemp)"
          actual_file="$(mktemp)"
          sort -u < .ci-renderable-components.txt > "$expected_file"
          awk -F/ '$3 == "infrastructure" {print $4}' \
              .work/kustomize-safe-targets.txt 2>/dev/null \
            | sort -u > "$actual_file"
          if ! cmp -s "$expected_file" "$actual_file"; then
            echo "error: rendered base-component set != .ci-renderable-components.txt"
            echo "--- expected ---"
            cat "$expected_file"
            echo "--- actual ---"
            cat "$actual_file"
            echo "--- diff ---"
            diff "$expected_file" "$actual_file" || true
            rm -f "$expected_file" "$actual_file"
            exit 1
          fi
          count="$(wc -l < "$expected_file" | tr -d ' ')"
          rm -f "$expected_file" "$actual_file"
          echo "ok: rendered set matches .ci-renderable-components.txt ($count components)"

      - name: Check required CLI tools
        run: |
          set -eu
          command -v yq >/dev/null 2>&1 || { echo "error: yq is required but not installed"; exit 1; }
          command -v kyverno >/dev/null 2>&1 || { echo "error: kyverno CLI is required but not installed"; exit 1; }

      - name: Validate Kyverno policies from source manifests
        run: |
          set -eu
          # Use a directory of per-file policy copies instead of a
          # single concatenated multi-doc file. kyverno-cli v1.17.x
          # (pinned) fails to parse the multi-doc form and reports
          # "Applying 0 policy rule(s)" — the silent-skip class that
          # the post-apply assertion below catches. A directory of
          # one-document-per-file works reliably across CLI versions.
          tmp_policy_dir="$(mktemp -d)"
          tmp_resources="$(mktemp)"
          tmp_manifest_list="$(mktemp)"

          git ls-files 'kubernetes/**/*.yaml' 'kubernetes/**/*.yml' > "$tmp_manifest_list"
          policy_count=0
          while IFS= read -r f; do
            [ -n "$f" ] || continue
            if yq -e '.apiVersion == "kyverno.io/v1" and (.kind == "ClusterPolicy" or .kind == "Policy")' "$f" >/dev/null 2>&1; then
              # Encode path into filename to keep them unique under the
              # flat policy dir layout.
              dest="$(printf '%s' "$f" | tr '/' '_')"
              cp "$f" "$tmp_policy_dir/$dest"
              policy_count=$((policy_count + 1))
            fi
          done < "$tmp_manifest_list"

          if [ "$policy_count" -eq 0 ]; then
            echo "notice: no Kyverno policies found in source manifests"
            exit 0
          fi
          echo "kyverno policies discovered: $policy_count"

          # Smoke fixture: one minimal resource per kind matched by any
          # base PNI ClusterPolicy. Each resource is shaped to PASS the
          # policy so the smoke test verifies the policy evaluates and
          # catches the silent-skip regression class (match.kinds
          # narrowed to a kind absent from the fixture).
          #
          # Kinds covered:
          #   Namespace   pni-contract, pni-capability-validation,
          #               pni-reserved-labels-namespace, vault-ca-distribution
          #   HTTPRoute   external-httproute-hostnames-enforce
          #   Service     pni-reserved-annotations-enforce
          #   Pod, Deployment, StatefulSet, DaemonSet, Job, CronJob
          #               pni-reserved-labels-workload + capability-provider-workload
          #   ConfigMap   no policy matches today — future-proofing slot
          cat > "$tmp_resources" <<'EOF'
          ---
          apiVersion: v1
          kind: Namespace
          metadata:
            name: kyverno-ci-smoke
            labels:
              platform.io/network-interface-version: "v1"
              platform.io/network-profile: "managed"
              platform.io/consume.monitoring-scrape: "true"
          ---
          apiVersion: gateway.networking.k8s.io/v1
          kind: HTTPRoute
          metadata:
            name: kyverno-ci-smoke-internal
            namespace: kyverno-ci-smoke
            labels:
              app.kubernetes.io/name: kyverno-ci-smoke
          spec:
            parentRefs:
              - name: cluster-gateway
                namespace: gateway
                sectionName: https
            hostnames:
              - internal.smoke.example
            rules:
              - backendRefs:
                  - name: kyverno-ci-smoke
                    port: 80
          ---
          apiVersion: v1
          kind: Service
          metadata:
            name: kyverno-ci-smoke
            namespace: kyverno-ci-smoke
            labels:
              app.kubernetes.io/name: kyverno-ci-smoke
            # annotations map MUST be present (even with a fixture-only
            # entry) so the reserved-annotations policy's items(@,…)
            # JMESPath does not error on nil traversal.
            annotations:
              fixture.kyverno-ci-smoke/note: "fixture-only annotation, not reserved"
          spec:
            selector:
              app.kubernetes.io/name: kyverno-ci-smoke
            ports:
              - name: http
                port: 80
                targetPort: 8080
          ---
          apiVersion: v1
          kind: Pod
          metadata:
            name: kyverno-ci-smoke-pod
            namespace: kyverno-ci-smoke
            labels:
              app.kubernetes.io/name: kyverno-ci-smoke
          spec:
            containers:
              - name: pause
                image: registry.k8s.io/pause:3.10
          ---
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: kyverno-ci-smoke
            namespace: kyverno-ci-smoke
            labels:
              app.kubernetes.io/name: kyverno-ci-smoke
          spec:
            replicas: 1
            selector:
              matchLabels:
                app.kubernetes.io/name: kyverno-ci-smoke
            template:
              metadata:
                labels:
                  app.kubernetes.io/name: kyverno-ci-smoke
              spec:
                containers:
                  - name: pause
                    image: registry.k8s.io/pause:3.10
          ---
          apiVersion: apps/v1
          kind: StatefulSet
          metadata:
            name: kyverno-ci-smoke-sts
            namespace: kyverno-ci-smoke
            labels:
              app.kubernetes.io/name: kyverno-ci-smoke
          spec:
            serviceName: kyverno-ci-smoke
            replicas: 1
            selector:
              matchLabels:
                app.kubernetes.io/name: kyverno-ci-smoke-sts
            template:
              metadata:
                labels:
                  app.kubernetes.io/name: kyverno-ci-smoke-sts
              spec:
                containers:
                  - name: pause
                    image: registry.k8s.io/pause:3.10
          ---
          apiVersion: apps/v1
          kind: DaemonSet
          metadata:
            name: kyverno-ci-smoke-ds
            namespace: kyverno-ci-smoke
            labels:
              app.kubernetes.io/name: kyverno-ci-smoke
          spec:
            selector:
              matchLabels:
                app.kubernetes.io/name: kyverno-ci-smoke-ds
            template:
              metadata:
                labels:
                  app.kubernetes.io/name: kyverno-ci-smoke-ds
              spec:
                containers:
                  - name: pause
                    image: registry.k8s.io/pause:3.10
          ---
          apiVersion: batch/v1
          kind: Job
          metadata:
            name: kyverno-ci-smoke-job
            namespace: kyverno-ci-smoke
            labels:
              app.kubernetes.io/name: kyverno-ci-smoke
          spec:
            template:
              metadata:
                labels:
                  app.kubernetes.io/name: kyverno-ci-smoke-job
              spec:
                restartPolicy: Never
                containers:
                  - name: pause
                    image: registry.k8s.io/pause:3.10
          ---
          apiVersion: batch/v1
          kind: CronJob
          metadata:
            name: kyverno-ci-smoke-cron
            namespace: kyverno-ci-smoke
            labels:
              app.kubernetes.io/name: kyverno-ci-smoke
          spec:
            schedule: "*/5 * * * *"
            jobTemplate:
              spec:
                template:
                  metadata:
                    labels:
                      app.kubernetes.io/name: kyverno-ci-smoke-cron
                  spec:
                    restartPolicy: Never
                    containers:
                      - name: pause
                        image: registry.k8s.io/pause:3.10
          ---
          apiVersion: v1
          kind: ConfigMap
          metadata:
            name: kyverno-ci-smoke-cm
            namespace: kyverno-ci-smoke
          data:
            unused: "fixture for kind-coverage; no policy matches ConfigMap today"
          EOF

          kyverno version
          tmp_log="$(mktemp)"
          if ! kyverno apply "$tmp_policy_dir" --resource "$tmp_resources" --warn-no-pass=false 2>&1 | tee "$tmp_log"; then
            echo "error: kyverno apply failed against smoke fixture"
            exit 1
          fi
          # Parse the kyverno summary line:
          #   pass: N, fail: N, warn: N, error: N, skip: N
          # Workload rules carry skipBackgroundRequests: true, so
          # kyverno-cli (background-scan mode) silently skips them.
          # The realistic admission-mode pass-count baseline is the
          # Namespace and Service rule passes. Asserting pass>0 catches
          # the silent-skip regression class without overfitting to
          # current rule counts.
          summary="$(grep -E '^pass:' "$tmp_log" | tail -1)"
          if [ -z "$summary" ]; then
            echo "error: no kyverno summary line found"
            exit 1
          fi
          pass_count="$(echo "$summary"  | sed -nE 's/.*pass:[[:space:]]*([0-9]+).*/\1/p')"
          fail_count="$(echo "$summary"  | sed -nE 's/.*fail:[[:space:]]*([0-9]+).*/\1/p')"
          error_count="$(echo "$summary" | sed -nE 's/.*error:[[:space:]]*([0-9]+).*/\1/p')"
          if [ "$pass_count" -lt 1 ]; then
            echo "error: kyverno smoke produced zero passes — every rule was silently skipped"
            exit 1
          fi
          if [ "$fail_count" -ne 0 ]; then
            echo "error: smoke fixture produced $fail_count policy failures"
            exit 1
          fi
          if [ "$error_count" -ne 0 ]; then
            echo "error: smoke fixture produced $error_count policy errors (JMESPath/context resolution failure)"
            exit 1
          fi
          echo "ok: kyverno smoke fixture — pass=$pass_count fail=$fail_count error=$error_count"

      - name: Run kyverno-cli unit tests
        run: |
          set -eu
          # Each test directory carries its own kyverno-test.yaml,
          # resources, and values. Run every test discovered under
          # kubernetes/base/**/tests/**/kyverno-test.yaml.
          found=0
          failed=0
          while IFS= read -r test_yaml; do
            [ -n "$test_yaml" ] || continue
            test_dir="$(dirname "$test_yaml")"
            found=$((found + 1))
            echo "kyverno test: $test_dir"
            if ! kyverno test "$test_dir"; then
              failed=$((failed + 1))
            fi
          done <<EOF
          $(find kubernetes/base -type f -name 'kyverno-test.yaml' | sort)
          EOF
          if [ "$found" -eq 0 ]; then
            echo "notice: no kyverno-cli unit tests found"
            exit 0
          fi
          if [ "$failed" -ne 0 ]; then
            echo "error: $failed of $found kyverno test directories failed"
            exit 1
          fi
          echo "ok: $found kyverno test directories passed"

      - name: Lint Kyverno JMESPath anti-patterns
        run: |
          set -eu
          if grep -R -n -E --include='*.yaml' --include='*.yml' "request\\.object\\.metadata\\.labels\\.'[^']+'" kubernetes/; then
            echo "error: invalid Kyverno JMESPath pattern detected. Use labels.\\\"key\\\" syntax for dotted/slashed label keys."
            exit 1
          fi

      - name: Kubeconform rendered manifests
        run: |
          set -eu
          if [ ! -f .work/kustomize-rendered-files.txt ]; then
            echo "notice: rendered file list not found, skipping kubeconform"
            exit 0
          fi

          count=0
          while IFS= read -r f; do
            [ -n "$f" ] || continue
            [ -f "$f" ] || continue
            count=$((count + 1))
            echo "kubeconform: $f"
            kubeconform -strict -ignore-missing-schemas "$f"
          done < .work/kustomize-rendered-files.txt

          echo "kubeconform tested files: $count"

      - name: Conftest policy checks
        run: ./scripts/run_conftest.sh

      - name: Upload diagnostics (failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: gitops-validate-diagnostics
          path: |
            .work/

  secret-scan:
    name: Secret Scan (gitleaks)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout (full history for secret scan)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install gitleaks v8.24.3
        env:
          GITLEAKS_VERSION: 8.24.3
          GITLEAKS_SHA256: 9991e0b2903da4c8f6122b5c3186448b927a5da4deef1fe45271c3793f4ee29c
        run: |
          set -euo pipefail
          tmp="$(mktemp -d)"
          cd "$tmp"
          curl -fsSLo gitleaks.tar.gz \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          echo "${GITLEAKS_SHA256}  gitleaks.tar.gz" | sha256sum -c -
          tar -xzf gitleaks.tar.gz gitleaks
          mkdir -p "$HOME/.local/bin"
          install -m 0755 gitleaks "$HOME/.local/bin/gitleaks"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          "$HOME/.local/bin/gitleaks" version

      - name: Run gitleaks (full history)
        # --config: pin shared .gitleaks.toml so this scan and the
        # pre-commit hook cannot drift across the project lifecycle.
        run: gitleaks detect --source . --config .gitleaks.toml --redact --verbose --exit-code 1 --no-banner
