name: Hard Constraints Check

# Enforces cluster-wide invariants from AGENTS.md §Hard Constraints.
# Runs on PR diffs only — does not scan the entire repo history.
# Must be added as a required status check in Branch Protection Rules.
# Settings → Branches → main → Require status checks → "Hard Constraints Check / hard-constraints"

on:
  pull_request:

# Note: paths: filter intentionally removed. Path-filtered required-checks
# count as "skipped/successful" in branch protection — a PR touching only
# scripts/, docs/, or .github/ would silently bypass this gate. The grep
# steps below short-circuit cleanly when CHANGED is empty for the workflow's
# original scope, so the cost of always running is negligible.

permissions:
  contents: read

jobs:
  hard-constraints:
    name: Hard Constraints
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # All three checks below skip documentation files (*.md). The
       # constraints apply to live config (YAML manifests, Talos patches,
       # kernel cmdline) — documentation that *names* a forbidden value to
       # explain why it is forbidden is not a violation and must not trigger.
      - name: Check forbidden Kubernetes kinds (Ingress, Endpoints)
        shell: bash
        run: |
          set -euo pipefail
          FAIL=0
          CHANGED_K8S=$(git diff --name-only origin/${{ github.base_ref }}...HEAD -- 'kubernetes/**' ':(exclude,glob)kubernetes/**/*.md' 2>/dev/null || true)
          [ -n "$CHANGED_K8S" ] || exit 0
          MATCHES=""
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            [ -f "$f" ] || continue
            if grep -lE '^kind:[[:space:]]*(Ingress|Endpoints)\b' "$f" >/dev/null 2>&1; then
              MATCHES="${MATCHES}${f}"$'\n'
            fi
          done <<<"$CHANGED_K8S"
          if [ -n "$MATCHES" ]; then
            echo "::error::Forbidden resource kind (Ingress or Endpoints) detected in:"
            printf '%s' "$MATCHES"
            echo "Fix: Use HTTPRoute/TLSRoute (Gateway API) instead of Ingress; use EndpointSlice instead of Endpoints."
            FAIL=1
          fi
          exit $FAIL

      - name: Check forbidden Talos installer image (SecureBoot)
        shell: bash
        run: |
          set -euo pipefail
          FAIL=0
          CHANGED_TALOS=$(git diff --name-only origin/${{ github.base_ref }}...HEAD -- 'talos/**' ':(exclude,glob)talos/**/*.md' 2>/dev/null || true)
          [ -n "$CHANGED_TALOS" ] || exit 0
          MATCHES=""
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            [ -f "$f" ] || continue
            if grep -l 'metal-installer-secureboot' "$f" >/dev/null 2>&1; then
              MATCHES="${MATCHES}${f}"$'\n'
            fi
          done <<<"$CHANGED_TALOS"
          if [ -n "$MATCHES" ]; then
            echo "::error::Forbidden SecureBoot installer image (metal-installer-secureboot) detected in:"
            printf '%s' "$MATCHES"
            echo "Fix: Use metal-installer (SecureBoot causes boot loops on this cluster)."
            FAIL=1
          fi
          exit $FAIL

      - name: Check forbidden kernel boot parameter (debugfs=off)
        shell: bash
        run: |
          set -euo pipefail
          FAIL=0
          CHANGED_ALL=$(git diff --name-only origin/${{ github.base_ref }}...HEAD -- 'kubernetes/**' 'talos/**' ':(exclude,glob)**/*.md' 2>/dev/null || true)
          [ -n "$CHANGED_ALL" ] || exit 0
          MATCHES=""
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            [ -f "$f" ] || continue
            if grep -l 'debugfs=off' "$f" >/dev/null 2>&1; then
              MATCHES="${MATCHES}${f}"$'\n'
            fi
          done <<<"$CHANGED_ALL"
          if [ -n "$MATCHES" ]; then
            echo "::error::Forbidden kernel boot parameter (debugfs=off) detected in:"
            printf '%s' "$MATCHES"
            echo "Fix: Remove debugfs=off — it causes 'failed to create root filesystem' boot loops with Cilium."
            FAIL=1
          fi
          exit $FAIL
