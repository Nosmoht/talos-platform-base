# https://docs.github.com/communities/using-templates-to-encourage-useful-issues-and-pull-requests/configuring-issue-templates-for-your-repository
blank_issues_enabled: false
contact_links:
  - name: Security vulnerability
    url: https://github.com/Nosmoht/talos-platform-base/security/policy
    about: Do NOT file public security issues. See SECURITY.md for the private disclosure channel.
