apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: root-bootstrap
  namespace: argocd
spec:
  description: Bootstrap scope for root app-of-apps
  sourceRepos:
    - https://github.com/Nosmoht/Talos-Homelab.git
  destinations:
    - namespace: argocd
      server: https://kubernetes.default.svc
    - namespace: default
      server: https://kubernetes.default.svc
  clusterResourceWhitelist:
    - group: ""
      kind: Namespace
    - group: cilium.io
      kind: CiliumLoadBalancerIPPool
    - group: cilium.io
      kind: CiliumL2AnnouncementPolicy
  namespaceResourceWhitelist:
    - group: argoproj.io
      kind: AppProject
    - group: argoproj.io
      kind: Application
    - group: gateway.networking.k8s.io
      kind: Gateway
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
    - group: cert-manager.io
      kind: Certificate
