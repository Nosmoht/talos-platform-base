apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: root-bootstrap
  namespace: argocd
  labels:
    app.kubernetes.io/name: argocd
    app.kubernetes.io/instance: homelab
    app.kubernetes.io/component: project
    app.kubernetes.io/part-of: homelab
    app.kubernetes.io/managed-by: bootstrap
spec:
  description: Bootstrap scope for root app-of-apps
  sourceRepos:
    - https://github.com/Nosmoht/Talos-Homelab.git
  destinations:
    - namespace: argocd
      server: https://kubernetes.default.svc
  clusterResourceWhitelist:
    - group: ""
      kind: Namespace
  namespaceResourceWhitelist:
    - group: argoproj.io
      kind: AppProject
    - group: argoproj.io
      kind: Application
