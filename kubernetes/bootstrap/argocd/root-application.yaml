apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root
  namespace: argocd
  labels:
    app.kubernetes.io/name: argocd
    app.kubernetes.io/instance: homelab
    app.kubernetes.io/component: root-application
    app.kubernetes.io/part-of: homelab
    app.kubernetes.io/managed-by: bootstrap
spec:
  project: root-bootstrap
  source:
    repoURL: https://github.com/Nosmoht/Talos-Homelab.git
    targetRevision: main
    path: kubernetes/overlays/homelab
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
