---
# Gateway API: GatewayClass for Cilium (not generated by Helm chart, must be explicit)
apiVersion: gateway.networking.k8s.io/v1
kind: GatewayClass
metadata:
  name: cilium
spec:
  controllerName: io.cilium/gateway-controller
  parametersRef:
    group: cilium.io
    kind: CiliumGatewayClassConfig
    name: homelab-gateway-config
    namespace: default
---
# Gateway API: additional RBAC for cilium-operator (requires gatewayAPI.enabled=true)
# These rules are missing from the rendered manifest when gateway-api CRDs are not
# present at Helm template time, but are required at runtime.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: cilium-operator-gateway-api
  labels:
    app.kubernetes.io/part-of: cilium
rules:
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["create", "update", "delete", "patch"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create", "update", "delete", "patch"]
  - apiGroups: ["discovery.k8s.io"]
    resources: ["endpointslices"]
    verbs: ["create", "update", "delete", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: cilium-operator-gateway-api
  labels:
    app.kubernetes.io/part-of: cilium
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cilium-operator-gateway-api
subjects:
  - kind: ServiceAccount
    name: cilium-operator
    namespace: kube-system
