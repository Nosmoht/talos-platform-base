apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - namespace.yaml

helmCharts:
  - name: vault-config-operator
    repo: https://redhat-cop.github.io/vault-config-operator
    version: v0.8.38
    releaseName: vault-config-operator
    namespace: vault
    valuesFile: values.yaml
    includeCRDs: true
