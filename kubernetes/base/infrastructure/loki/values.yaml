deploymentMode: SimpleScalable

loki:
  auth_enabled: false
  commonConfig:
    path_prefix: /var/loki
    replication_factor: 2
  storage:
    type: s3
    bucketNames:
      chunks: loki-chunks
      ruler: loki-ruler
      admin: loki-admin
    s3:
      endpoint: minio.minio.svc.cluster.local:443
      region: us-east-1
      accessKeyId: ${LOKI_S3_ACCESS_KEY_ID}
      secretAccessKey: ${LOKI_S3_SECRET_ACCESS_KEY}
      s3ForcePathStyle: true
      insecure: false
      http_config:
        ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
  schemaConfig:
    configs:
      - from: "2024-01-01"
        store: tsdb
        object_store: s3
        schema: v13
        index:
          prefix: index_
          period: 24h
  limits_config:
    retention_period: 168h
    allow_structured_metadata: true
    ingestion_rate_mb: 16
    ingestion_burst_size_mb: 32
  compactor:
    working_directory: /var/loki/compactor
    retention_enabled: true
    delete_request_store: s3
  rulerConfig:
    storage:
      type: local
      local:
        directory: /var/loki/rules
    rule_path: /var/loki/rules/fake
    alertmanager_url: http://monitoring-kube-prometheus-alertmanager.monitoring.svc:9093

global:
  extraArgs:
    - -config.expand-env=true
  extraEnvFrom:
    - secretRef:
        name: loki-minio-credentials

singleBinary:
  replicas: 0
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: 1
      memory: 1Gi

read:
  replicas: 2
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: 2
      memory: 2Gi

write:
  replicas: 2
  nodeSelector:
    feature.node.kubernetes.io/storage-nvme.present: "true"
  persistence:
    storageClass: linstor-csi
    size: 20Gi
  resources:
    requests:
      cpu: 300m
      memory: 1Gi
    limits:
      cpu: 2
      memory: 3Gi

backend:
  replicas: 2
  nodeSelector:
    feature.node.kubernetes.io/storage-nvme.present: "true"
  persistence:
    storageClass: linstor-csi
    size: 20Gi
  resources:
    requests:
      cpu: 300m
      memory: 1Gi
    limits:
      cpu: 2
      memory: 3Gi

serviceMonitor:
  enabled: true
  interval: 30s

lokiCanary:
  tolerations:
    - key: nvidia.com/gpu
      operator: Equal
      value: "present"
      effect: NoSchedule
