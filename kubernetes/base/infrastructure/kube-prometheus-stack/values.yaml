prometheusOperator:
  enabled: true

prometheus:
  prometheusSpec:
    serviceDiscoveryRole: EndpointSlice
    serviceMonitorSelectorNilUsesHelmValues: false
    serviceMonitorSelector: {}
    podMonitorSelectorNilUsesHelmValues: false
    podMonitorSelector: {}
    probeSelectorNilUsesHelmValues: false
    probeSelector: {}
    ruleSelectorNilUsesHelmValues: false
    ruleSelector: {}
    enableRemoteWriteReceiver: true
    # Producer-side PNI labeling — Prometheus is the consumer of the
    # monitoring-scrape capability (it consumes /metrics endpoints
    # exposed by workloads). Source selector of
    # ccnp-pni-monitoring-scrape-consumer-egress matches this label.
    podMetadata:
      labels:
        platform.io/capability-consumer.monitoring-scrape: "true"
    resources:
      requests:
        cpu: 200m
        memory: 512Mi

grafana:
  # Admin credentials must come from a pre-existing Secret rather than a
  # chart-generated random password. Reason: helm template's randAlphaNum
  # is non-deterministic, so a chart-generated grafana-admin Secret
  # produces a different value on every render → break of the
  # rendered-manifests verify-rendered drift gate.
  # Phase A's ExternalSecret provisions this Secret from Vault at deploy
  # time. Same name in every consumer cluster — see Phase A.3 inventory.
  admin:
    existingSecret: grafana-admin-credentials
    userKey: admin-user
    passwordKey: admin-password
  defaultDashboardsEnabled: true
  sidecar:
    dashboards:
      enabled: true
      label: grafana_dashboard
      labelValue: "1"
    datasources:
      enabled: false

kubeProxy:
  enabled: false

kubeEtcd:
  enabled: false
