prometheusOperator:
  enabled: true

prometheus:
  prometheusSpec:
    serviceDiscoveryRole: EndpointSlice
    serviceMonitorSelectorNilUsesHelmValues: false
    serviceMonitorSelector: {}
    podMonitorSelectorNilUsesHelmValues: false
    podMonitorSelector: {}
    probeSelectorNilUsesHelmValues: false
    probeSelector: {}
    ruleSelectorNilUsesHelmValues: false
    ruleSelector: {}
    enableRemoteWriteReceiver: true
    # Producer-side PNI labeling — Prometheus is the consumer of the
    # monitoring-scrape capability (it consumes /metrics endpoints
    # exposed by workloads). Source selector of
    # ccnp-pni-monitoring-scrape-consumer-egress matches this label.
    podMetadata:
      labels:
        platform.io/capability-consumer.monitoring-scrape: "true"
    resources:
      requests:
        cpu: 200m
        memory: 512Mi

grafana:
  defaultDashboardsEnabled: true
  sidecar:
    dashboards:
      enabled: true
      label: grafana_dashboard
      labelValue: "1"
    datasources:
      enabled: false

kubeProxy:
  enabled: false

kubeEtcd:
  enabled: false
