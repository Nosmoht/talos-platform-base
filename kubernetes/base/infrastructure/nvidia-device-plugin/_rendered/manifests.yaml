apiVersion: apps/v1
kind: DaemonSet
metadata:
  labels:
    app.kubernetes.io/instance: nvidia-device-plugin
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: nvidia-device-plugin
    app.kubernetes.io/version: 0.17.4
    helm.sh/chart: nvidia-device-plugin-0.17.4
  name: nvidia-device-plugin
  namespace: kube-system
spec:
  selector:
    matchLabels:
      app.kubernetes.io/instance: nvidia-device-plugin
      app.kubernetes.io/name: nvidia-device-plugin
  template:
    metadata:
      annotations: {}
      labels:
        app.kubernetes.io/instance: nvidia-device-plugin
        app.kubernetes.io/name: nvidia-device-plugin
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: extensions.talos.dev/nvidia-open-gpu-kernel-modules-lts
                    operator: Exists
      containers:
        - command:
            - nvidia-device-plugin
          env:
            - name: MPS_ROOT
              value: /run/nvidia/mps
            - name: NVIDIA_VISIBLE_DEVICES
              value: all
            - name: NVIDIA_DRIVER_CAPABILITIES
              value: compute,utility
          image: nvcr.io/nvidia/k8s-device-plugin:v0.17.4
          imagePullPolicy: IfNotPresent
          name: nvidia-device-plugin-ctr
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - mountPath: /var/lib/kubelet/device-plugins
              name: kubelet-device-plugins-dir
            - mountPath: /dev/shm
              name: mps-shm
            - mountPath: /mps
              name: mps-root
            - mountPath: /var/run/cdi
              name: cdi-root
      priorityClassName: system-node-critical
      runtimeClassName: nvidia
      securityContext: {}
      tolerations:
        - effect: NoSchedule
          key: nvidia.com/gpu
          operator: Equal
          value: present
      volumes:
        - hostPath:
            path: /var/lib/kubelet/device-plugins
            type: Directory
          name: kubelet-device-plugins-dir
        - hostPath:
            path: /run/nvidia/mps
            type: DirectoryOrCreate
          name: mps-root
        - hostPath:
            path: /run/nvidia/mps/shm
          name: mps-shm
        - hostPath:
            path: /var/run/cdi
            type: DirectoryOrCreate
          name: cdi-root
  updateStrategy:
    type: RollingUpdate
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  labels:
    app.kubernetes.io/instance: nvidia-device-plugin
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: nvidia-device-plugin
    app.kubernetes.io/version: 0.17.4
    helm.sh/chart: nvidia-device-plugin-0.17.4
  name: nvidia-device-plugin-mps-control-daemon
  namespace: kube-system
spec:
  selector:
    matchLabels:
      app.kubernetes.io/instance: nvidia-device-plugin
      app.kubernetes.io/name: nvidia-device-plugin
  template:
    metadata:
      annotations: {}
      labels:
        app.kubernetes.io/instance: nvidia-device-plugin
        app.kubernetes.io/name: nvidia-device-plugin
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: extensions.talos.dev/nvidia-open-gpu-kernel-modules-lts
                    operator: Exists
      containers:
        - command:
            - mps-control-daemon
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  apiVersion: v1
                  fieldPath: spec.nodeName
            - name: NVIDIA_VISIBLE_DEVICES
              value: all
            - name: NVIDIA_DRIVER_CAPABILITIES
              value: compute,utility
          image: nvcr.io/nvidia/k8s-device-plugin:v0.17.4
          imagePullPolicy: IfNotPresent
          name: mps-control-daemon-ctr
          securityContext:
            privileged: true
          volumeMounts:
            - mountPath: /dev/shm
              name: mps-shm
            - mountPath: /mps
              name: mps-root
      initContainers:
        - command:
            - mps-control-daemon
            - mount-shm
          image: nvcr.io/nvidia/k8s-device-plugin:v0.17.4
          name: mps-control-daemon-mounts
          securityContext:
            privileged: true
          volumeMounts:
            - mountPath: /mps
              mountPropagation: Bidirectional
              name: mps-root
      nodeSelector:
        nvidia.com/mps.capable: "true"
      priorityClassName: system-node-critical
      runtimeClassName: nvidia
      securityContext: {}
      tolerations:
        - effect: NoSchedule
          key: nvidia.com/gpu
          operator: Equal
          value: present
      volumes:
        - hostPath:
            path: /run/nvidia/mps
            type: DirectoryOrCreate
          name: mps-root
        - hostPath:
            path: /run/nvidia/mps/shm
          name: mps-shm
  updateStrategy:
    type: RollingUpdate
