apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/component: operator
    app.kubernetes.io/instance: tetragon
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: tetragon-operator
    app.kubernetes.io/part-of: tetragon
    app.kubernetes.io/version: 1.6.1
    helm.sh/chart: tetragon-1.6.1
  name: tetragon-operator
  namespace: tetragon
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/instance: tetragon
      app.kubernetes.io/name: tetragon-operator
  strategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
    type: RollingUpdate
  template:
    metadata:
      labels:
        app.kubernetes.io/component: operator
        app.kubernetes.io/instance: tetragon
        app.kubernetes.io/managed-by: Helm
        app.kubernetes.io/name: tetragon-operator
        app.kubernetes.io/part-of: tetragon
        app.kubernetes.io/version: 1.6.1
        helm.sh/chart: tetragon-1.6.1
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: tetragon-operator
                topologyKey: kubernetes.io/hostname
              weight: 100
      containers:
        - args:
            - serve
            - --config-dir=/etc/tetragon/operator.conf.d/
            - --metrics-bind-address=:2113
          command:
            - /usr/bin/tetragon-operator
          image: quay.io/cilium/tetragon-operator:v1.6.1
          imagePullPolicy: IfNotPresent
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 15
            periodSeconds: 20
          name: tetragon-operator
          ports:
            - containerPort: 2113
              name: metrics
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            limits:
              cpu: 500m
              memory: 128Mi
            requests:
              cpu: 10m
              memory: 64Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            runAsGroup: 65532
            runAsNonRoot: true
            runAsUser: 65532
          volumeMounts:
            - mountPath: /etc/tetragon/operator.conf.d/
              name: tetragon-operator-config
              readOnly: true
      serviceAccountName: tetragon-operator-service-account
      terminationGracePeriodSeconds: 10
      tolerations:
        - effect: NoSchedule
          key: nvidia.com/gpu
          operator: Equal
          value: present
      volumes:
        - configMap:
            name: tetragon-operator-config
          name: tetragon-operator-config
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  labels:
    app.kubernetes.io/component: agent
    app.kubernetes.io/instance: tetragon
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: tetragon
    app.kubernetes.io/part-of: tetragon
    app.kubernetes.io/version: 1.6.1
    helm.sh/chart: tetragon-1.6.1
  name: tetragon
  namespace: tetragon
spec:
  selector:
    matchLabels:
      app.kubernetes.io/instance: tetragon
      app.kubernetes.io/name: tetragon
  template:
    metadata:
      annotations:
        checksum/configmap: 53452adf89fa496635f0ad1e5887bba06891276aebb1bcf13a3e5365d7d578c6
      labels:
        app.kubernetes.io/component: agent
        app.kubernetes.io/instance: tetragon
        app.kubernetes.io/managed-by: Helm
        app.kubernetes.io/name: tetragon
        app.kubernetes.io/part-of: tetragon
        app.kubernetes.io/version: 1.6.1
        helm.sh/chart: tetragon-1.6.1
    spec:
      containers:
        - args:
            - /var/run/cilium/tetragon/tetragon.log
          command:
            - hubble-export-stdout
          image: quay.io/cilium/hubble-export-stdout:v1.1.0
          imagePullPolicy: IfNotPresent
          name: export-stdout
          resources: {}
          securityContext: {}
          terminationMessagePolicy: FallbackToLogsOnError
          volumeMounts:
            - mountPath: /var/run/cilium/tetragon
              name: export-logs
        - args:
            - --config-dir=/etc/tetragon/tetragon.conf.d/
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          image: quay.io/cilium/tetragon:v1.6.1
          imagePullPolicy: IfNotPresent
          livenessProbe:
            grpc:
              port: 6789
              service: liveness
            timeoutSeconds: 60
          name: tetragon
          resources:
            limits:
              cpu: 500m
              memory: 512Mi
            requests:
              cpu: 50m
              memory: 128Mi
          securityContext:
            privileged: true
          terminationMessagePolicy: FallbackToLogsOnError
          volumeMounts:
            - mountPath: /sys/kernel/tracing
              name: tracefs
            - mountPath: /etc/tetragon/tetragon.conf.d/
              name: tetragon-config
              readOnly: true
            - mountPath: /sys/fs/bpf
              mountPropagation: Bidirectional
              name: bpf-maps
            - mountPath: /var/run/cilium
              name: cilium-run
            - mountPath: /var/run/cilium/tetragon
              name: export-logs
            - mountPath: /procRoot
              name: host-proc
      dnsPolicy: Default
      hostNetwork: true
      initContainers: null
      serviceAccountName: tetragon
      terminationGracePeriodSeconds: 1
      tolerations:
        - effect: NoSchedule
          key: nvidia.com/gpu
          operator: Equal
          value: present
      volumes:
        - hostPath:
            path: /var/run/cilium
            type: DirectoryOrCreate
          name: cilium-run
        - hostPath:
            path: /var/run/cilium/tetragon
            type: DirectoryOrCreate
          name: export-logs
        - configMap:
            name: tetragon-config
          name: tetragon-config
        - hostPath:
            path: /sys/fs/bpf
            type: DirectoryOrCreate
          name: bpf-maps
        - hostPath:
            path: /proc
            type: Directory
          name: host-proc
        - hostPath:
            path: /sys/kernel/tracing
            type: Directory
          name: tracefs
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  labels:
    app.kubernetes.io/component: agent
    app.kubernetes.io/instance: tetragon
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: tetragon
    app.kubernetes.io/part-of: tetragon
    app.kubernetes.io/version: 1.6.1
    helm.sh/chart: tetragon-1.6.1
  name: tetragon
  namespace: tetragon
spec:
  endpoints:
    - honorLabels: true
      interval: 10s
      path: /metrics
      port: metrics
      relabelings:
        - action: replace
          replacement: ${1}
          sourceLabels:
            - __meta_kubernetes_pod_node_name
          targetLabel: node
        - action: replace
          replacement: ${1}
          sourceLabels:
            - __meta_kubernetes_pod_name
          targetLabel: tetragon_pod
  namespaceSelector:
    matchNames:
      - tetragon
  selector:
    matchLabels:
      app.kubernetes.io/instance: tetragon
      app.kubernetes.io/name: tetragon
