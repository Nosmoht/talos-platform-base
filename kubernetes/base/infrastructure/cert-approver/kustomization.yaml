apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# cert-approver is upstream-distributed via kustomize-from-git, not a Helm
# repo. Standalone-rendering this base directory yields only the namespace.
# Consumer overlays add the upstream kustomize remote-base via their
# Application CR (`spec.source.repoURL: github.com/alex1989hu/...,
# path: deploy/standalone, targetRevision: <pinned-tag>`).
resources:
  - namespace.yaml
