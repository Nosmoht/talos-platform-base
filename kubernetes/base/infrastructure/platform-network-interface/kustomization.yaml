  - resources/ccnp-pni-vault-secrets-consumer-egress.yaml
  - resources/ccnp-pni-redis-managed-consumer-egress.yaml
  - resources/ccnp-pni-kafka-managed-consumer-egress.yaml
  - resources/ccnp-pni-rabbitmq-managed-consumer-egress.yaml
  - resources/ccnp-pni-gateway-backend-consumer-ingress.yaml
  - resources/ccnp-pni-monitoring-scrape-consumer-egress.yaml
  - resources/ccnp-pni-monitoring-scrape-provider-egress.yaml
  - resources/ccnp-pni-internet-egress-consumer-egress.yaml
