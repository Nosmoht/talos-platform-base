apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: pni-reserved-labels-audit
  labels:
    app.kubernetes.io/name: platform-network-interface
    app.kubernetes.io/component: policy-governance
    app.kubernetes.io/managed-by: argocd
spec:
  validationFailureAction: Enforce
  background: true
  admission: true
  emitWarning: false
  # Trust model:
  # PNI v2 uses **namespace-anchored** producer trust. Rule 3
  # (capability-provider-requires-namespace-provide) denies a pod from
  # carrying `platform.io/capability-provider.<X>[.<inst>]` unless the
  # pod's namespace carries the matching `platform.io/provide.<X>[.<inst>]:
  # "true"` label. Trust derives from the namespace — which is
  # platform-controlled — not from tool-identifying labels on the pod.
  #
  # Rules 1 and 2 retain the legacy ban on the three v1 reserved keys
  # (`platform.io/{provider,managed-by,capability}` without a dot
  # suffix), kept for backwards compatibility with any consumer
  # manifest that still references the v1 vocabulary. New work uses
  # the v2 keys (`provide.*`, `capability-provider.*`).
  #
  # The capability-first invariant explicitly forbids hardcoded
  # tool-name signature lists here: every Loki / Vault / cert-manager
  # / Piraeus swap would otherwise force an edit of this policy. See
  # ADR `adr-capability-producer-consumer-symmetry.md` §Namespace-
  # anchored producer trust.
  #
  # `skipBackgroundRequests: true` on all rules is LOAD-BEARING: it
  # prevents Kyverno's periodic background scans from re-evaluating
  # already-admitted pods and flagging transient inconsistencies.
  # Together with `allowExistingViolations: true`, this makes policy
  # transitions safe for running workloads — only new admission
  # events evaluate the current rules.
  rules:
    - name: reserved-pni-labels-namespace
      skipBackgroundRequests: true
      match:
        any:
          - resources:
              kinds:
                - Namespace
      validate:
        allowExistingViolations: true
        message: "Reserved PNI provider labels must not be set on namespaces by consumers"
        deny:
          conditions:
            any:
              - key: "{{ request.object.metadata.labels.\"platform.io/provider\" || '' }}"
                operator: NotEquals
                value: ""
              - key: "{{ request.object.metadata.labels.\"platform.io/managed-by\" || '' }}"
                operator: NotEquals
                value: ""
              - key: "{{ request.object.metadata.labels.\"platform.io/capability\" || '' }}"
                operator: NotEquals
                value: ""
    - name: reserved-pni-labels-workload
      # Legacy v1 reserved-key set on pods/controllers. Bare keys
      # (no dot suffix) are unconditionally denied — they were a
      # transitional vocabulary and no legitimate caller sets them.
      # The v2 capability-* keys are checked in the namespace-
      # anchored rule below.
      skipBackgroundRequests: true
      match:
        any:
          - resources:
              kinds:
                - Pod
                - Deployment
                - StatefulSet
                - DaemonSet
                - Job
                - CronJob
      validate:
        allowExistingViolations: true
        message: >-
          PNI violation: legacy reserved labels
          platform.io/{provider,managed-by,capability} are not permitted
          on workloads. Migrate to v2 vocabulary
          (platform.io/capability-provider.<cap>) and ensure the
          enclosing namespace carries platform.io/provide.<cap>: "true".
          See docs/adr-capability-producer-consumer-symmetry.md.
        deny:
          conditions:
            any:
              - key: "{{ request.object.metadata.labels.\"platform.io/provider\" || '' }}"
                operator: NotEquals
                value: ""
              - key: "{{ request.object.metadata.labels.\"platform.io/managed-by\" || '' }}"
                operator: NotEquals
                value: ""
              - key: "{{ request.object.metadata.labels.\"platform.io/capability\" || '' }}"
                operator: NotEquals
                value: ""
    - name: capability-provider-requires-namespace-provide
      # Namespace-anchored trust for v2 capability-provider.* labels.
      #
      # For every label on the workload whose key matches
      # `platform.io/capability-provider.<X>[.<inst>]`, require the
      # enclosing namespace to carry the matching
      # `platform.io/provide.<X>[.<inst>]: "true"` label. Trust
      # derives from the namespace — set by platform-base manifests
      # — not from operator-identifying signatures on the pod.
      #
      # Mechanism:
      #   1. Rule-level context.apiCall fetches namespace labels once.
      #   2. Foreach iterates labels on the workload.
      #   3. regex_match precondition narrows to capability-provider.* keys.
      #   4. Per-iteration variables derive the expected provide key.
      #   5. Kyverno's `lookup()` JMESPath extension reads the dynamic
      #      key from nsLabels.
      #   6. Deny fires when the looked-up value is not "true".
      skipBackgroundRequests: true
      match:
        any:
          - resources:
              kinds:
                - Pod
                - Deployment
                - StatefulSet
                - DaemonSet
                - Job
                - CronJob
      preconditions:
        all:
          # Short-circuit: rule fires only when the workload carries at
          # least one platform.io/capability-provider.* label. Avoids the
          # apiCall round-trip for the common case (workloads with no
          # producer-labels at all) and also keeps offline kyverno-cli
          # validation green for fixtures that don't include such labels.
          - key: >-
              {{ request.object.metadata.labels | items(@, 'key', 'value')
                 | [?starts_with(key, 'platform.io/capability-provider.')]
                 | length(@) }}
            operator: GreaterThan
            value: 0
      context:
        - name: nsLabels
          apiCall:
            urlPath: "/api/v1/namespaces/{{ request.namespace }}"
            jmesPath: "metadata.labels || `{}`"
      validate:
        allowExistingViolations: true
        # Rule-level message — cannot reference foreach `element.*` vars
        # (Kyverno validation error: "variable 'element.key' present
        # outside of foreach"). The per-label diagnostic which key
        # triggered the deny is exposed via Kyverno's verbose log
        # output (`kubectl get policyreport -A`), not the message
        # template — keep this string label-agnostic.
        message: >-
          PNI violation: {{ request.object.kind }}
          '{{ request.object.metadata.name }}' in namespace
          '{{ request.namespace }}' declares a
          platform.io/capability-provider.<cap> label but the
          namespace does not carry the matching
          platform.io/provide.<cap>[.<inst>]: "true" opt-in.
          Capability-provider trust is namespace-anchored: only
          namespaces the platform-base controls can authorise a pod
          to act as a producer. Add provide.<cap> to the
          namespace.yaml shipped with the producer component, or
          relocate the pod to a namespace that already carries the
          opt-in. See docs/adr-capability-producer-consumer-symmetry.md
          §Namespace-anchored producer trust.
        foreach:
          - list: "request.object.metadata.labels | items(@, 'key', 'value')"
            preconditions:
              all:
                - key: "{{ regex_match('^platform\\.io/capability-provider\\..+$', '{{ element.key }}') }}"
                  operator: Equals
                  value: true
            context:
              - name: capSuffix
                variable:
                  jmesPath: "regex_replace_all('^platform\\.io/capability-provider\\.', '{{ element.key }}', '')"
              - name: expectedNsKey
                variable:
                  jmesPath: "join('', ['platform.io/provide.', '{{ capSuffix }}'])"
              - name: nsProvideValue
                variable:
                  jmesPath: "lookup(nsLabels, '{{ expectedNsKey }}') || ''"
            deny:
              conditions:
                any:
                  - key: "{{ nsProvideValue }}"
                    operator: NotEquals
                    value: "true"
