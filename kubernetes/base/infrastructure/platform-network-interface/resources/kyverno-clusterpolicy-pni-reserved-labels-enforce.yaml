apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: pni-reserved-labels-audit
  labels:
    app.kubernetes.io/name: platform-network-interface
    app.kubernetes.io/component: policy-governance
    app.kubernetes.io/managed-by: argocd
spec:
  validationFailureAction: Enforce
  background: true
  admission: true
  emitWarning: false
  # Trust model for rules 2 + 3 below:
  # Both rules reject consumer-set PNI reserved labels UNLESS the pod
  # carries a recognised operator-managed label signature. Rather than
  # hardcoding a per-namespace exempt list (which leaked tenant NS
  # names like `plane` into this base-layer manifest), trust is
  # decided per pod from labels that upstream operators set on
  # managed pod templates.
  #
  # Signatures currently allowed:
  #   - RabbitMQ cluster-operator:
  #       app.kubernetes.io/component: rabbitmq
  #     (tamper-resistant — operator drops user-supplied
  #      app.kubernetes.io/* keys during label merge; source:
  #      rabbitmq/cluster-operator v2.20.0 internal/metadata/label.go)
  #   - OT-Container-Kit redis-operator:
  #       redis_setup_type: standalone|replication|sentinel|cluster
  #     (tamper-visible — operator applies stable labels first, then
  #      merges CR metadata.labels on top, so a CR can in principle
  #      override. Mitigated downstream by
  #      ccnp-pni-redis-operator-dataplane-egress additional
  #      discriminator `app.kubernetes.io/managed-by: redis-operator`.)
  #
  # Deferred signatures (add when a real need ships):
  #   - CNPG (cloudnative-pg): app.kubernetes.io/managed-by=cloudnative-pg.
  #     Hardcoded upstream constant, tamper-resistant. No CNPG-managed
  #     pod currently carries any reserved label, so adding now is
  #     speculative. When a capability-provider.cnpg-postgres CCNP is
  #     introduced, add `app.kubernetes.io/managed-by NotEquals
  #     cloudnative-pg` as an extra allow-condition to the deny-all
  #     chain in both rules 2 + 3.
  #
  # `skipBackgroundRequests: true` on both rules is LOAD-BEARING:
  # it prevents Kyverno's periodic background scans from re-evaluating
  # already-admitted pods and flagging transient inconsistencies.
  # Together with `allowExistingViolations: true`, this makes policy
  # transitions safe for running workloads — only new pod admission
  # events evaluate the current rules.
  rules:
    - name: reserved-pni-labels-namespace
      skipBackgroundRequests: true
      match:
        any:
          - resources:
              kinds:
                - Namespace
      validate:
        allowExistingViolations: true
        message: "Reserved PNI provider labels must not be set on namespaces by consumers"
        deny:
          conditions:
            any:
              - key: "{{ request.object.metadata.labels.\"platform.io/provider\" || '' }}"
                operator: NotEquals
                value: ""
              - key: "{{ request.object.metadata.labels.\"platform.io/managed-by\" || '' }}"
                operator: NotEquals
                value: ""
              - key: "{{ request.object.metadata.labels.\"platform.io/capability\" || '' }}"
                operator: NotEquals
                value: ""
    - name: reserved-pni-labels-workload
      skipBackgroundRequests: true
      match:
        any:
          - resources:
              kinds:
                - Pod
                - Deployment
                - StatefulSet
                - DaemonSet
                - Job
                - CronJob
      # No per-namespace exclude list — trust is determined per pod by
      # the operator-identifying label signatures checked in the deny
      # block below (see policy-level comment for the trust model).
      validate:
        allowExistingViolations: true
        message: >-
          platform.io/{provider,managed-by,capability} labels are reserved
          for pods managed by a trusted platform operator. The pod does
          not carry any recognised operator-managed label signature.
          See docs/platform-network-interface.md §Reserved Labels.
        foreach:
          - list: "request.object.metadata.labels | items(@, 'key', 'value')"
            preconditions:
              all:
                - key: "{{ element.key }}"
                  operator: AnyIn
                  value:
                    - platform.io/provider
                    - platform.io/managed-by
                    - platform.io/capability
            deny:
              conditions:
                all:
                  # Deny UNLESS at least one trust signature matches.
                  # Each condition checks for the ABSENCE of a signature;
                  # deny fires only when all signatures are absent.
                  - key: "{{ request.object.metadata.labels.\"app.kubernetes.io/component\" || '' }}"
                    operator: NotEquals
                    value: rabbitmq
                  - key: "{{ request.object.metadata.labels.\"redis_setup_type\" || '' }}"
                    operator: Equals
                    value: ""
    - name: reserved-pni-capability-provider-labels-workload
      skipBackgroundRequests: true
      match:
        any:
          - resources:
              kinds:
                - Pod
                - Deployment
                - StatefulSet
                - DaemonSet
                - Job
                - CronJob
      # No per-namespace exclude list — trust is determined per pod by
      # operator-managed label signatures (see deny block).
      validate:
        allowExistingViolations: true
        message: >-
          platform.io/capability-provider.* labels are reserved for pods
          managed by a trusted platform operator. The pod does not carry
          any recognised operator-managed label signature. A rogue
          capability-provider label silently enables cross-namespace
          ingress on the capability's data ports.
          See docs/platform-network-interface.md §Reserved Labels.
        foreach:
          - list: "request.object.metadata.labels | items(@, 'key', 'value')"
            preconditions:
              all:
                # Fire only on reserved capability-provider.* label keys.
                - key: "{{ element.key }}"
                  operator: Equals
                  value: "platform.io/capability-provider.*"
            deny:
              conditions:
                all:
                  # Deny UNLESS at least one operator signature matches.
                  # See policy-level comment for signature rationale
                  # and tamper-resistance profile per operator.
                  - key: "{{ request.object.metadata.labels.\"app.kubernetes.io/component\" || '' }}"
                    operator: NotEquals
                    value: rabbitmq
                  - key: "{{ request.object.metadata.labels.\"redis_setup_type\" || '' }}"
                    operator: Equals
                    value: ""
