apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: pni-reserved-labels-audit
  labels:
    app.kubernetes.io/name: platform-network-interface
    app.kubernetes.io/instance: homelab
    app.kubernetes.io/component: policy-governance
    app.kubernetes.io/part-of: homelab
    app.kubernetes.io/managed-by: argocd
spec:
  validationFailureAction: Enforce
  background: true
  admission: true
  emitWarning: false
  rules:
    - name: reserved-pni-labels-namespace
      skipBackgroundRequests: true
      match:
        any:
          - resources:
              kinds:
                - Namespace
      validate:
        allowExistingViolations: true
        message: "Reserved PNI provider labels must not be set on namespaces by consumers"
        deny:
          conditions:
            any:
              - key: "{{ request.object.metadata.labels.\"platform.io/provider\" || '' }}"
                operator: NotEquals
                value: ""
              - key: "{{ request.object.metadata.labels.\"platform.io/managed-by\" || '' }}"
                operator: NotEquals
                value: ""
              - key: "{{ request.object.metadata.labels.\"platform.io/capability\" || '' }}"
                operator: NotEquals
                value: ""
    - name: reserved-pni-labels-workload
      skipBackgroundRequests: true
      match:
        any:
          - resources:
              kinds:
                - Pod
                - Deployment
                - StatefulSet
                - DaemonSet
                - Job
                - CronJob
      exclude:
        any:
          - resources:
              namespaces:
                - kube-system
                - argocd
                - kyverno
                - cnpg-system
                - monitoring
                - piraeus-datastore
                - redis-system
                - rabbitmq-system
                - kafka
                - vault
                - minio
                - minio-operator
                - cert-manager
                - external-secrets
      validate:
        allowExistingViolations: true
        message: "Reserved PNI provider labels must not be set by consumer workloads"
        deny:
          conditions:
            any:
              - key: "{{ request.object.metadata.labels.\"platform.io/provider\" || '' }}"
                operator: NotEquals
                value: ""
              - key: "{{ request.object.metadata.labels.\"platform.io/managed-by\" || '' }}"
                operator: NotEquals
                value: ""
              - key: "{{ request.object.metadata.labels.\"platform.io/capability\" || '' }}"
                operator: NotEquals
                value: ""
    - name: reserved-pni-capability-provider-labels-workload
      skipBackgroundRequests: true
      match:
        any:
          - resources:
              kinds:
                - Pod
                - Deployment
                - StatefulSet
                - DaemonSet
                - Job
                - CronJob
      exclude:
        any:
          - resources:
              namespaces:
                - kube-system
                - argocd
                - kyverno
                - cnpg-system
                - monitoring
                - piraeus-datastore
                - redis-system
                - rabbitmq-system
                - kafka
                - vault
                - minio
                - minio-operator
                - cert-manager
                - external-secrets
                # Tenant namespaces that host their own operator-managed
                # provider instances (e.g. RabbitmqCluster plane-mq, Redis
                # redis). A follow-up PR should replace this per-namespace
                # exempt list with an ownerReferences-based rule that allows
                # capability-provider.* only on pods controlled by trusted
                # CRD kinds (RabbitmqCluster, Redis, CNPGCluster).
                - plane
      validate:
        allowExistingViolations: true
        message: >-
          platform.io/capability-provider.* labels are reserved for provider pods
          in operator namespaces and select PNI provider endpoints. Consumer
          workloads must not set them — a fat-fingered or malicious capability-provider
          label silently enables cross-namespace ingress on the capability's data ports.
          See docs/platform-network-interface.md §Reserved Labels.
        foreach:
          - list: "request.object.metadata.labels | items(@, 'key', 'value')"
            deny:
              conditions:
                all:
                  - key: "{{ element.key }}"
                    operator: Equals
                    value: "platform.io/capability-provider.*"
