apiVersion: cilium.io/v2
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: pni-redis-operator-dataplane-egress
  labels:
    app.kubernetes.io/name: platform-network-interface
    app.kubernetes.io/instance: homelab
    app.kubernetes.io/component: network-policy
    app.kubernetes.io/part-of: homelab
    app.kubernetes.io/managed-by: argocd
spec:
  endpointSelector:
    matchLabels:
      k8s:io.kubernetes.pod.namespace: redis-system
      name: redis-operator
  egress:
    # Managed Redis replication and Sentinel pods (any namespace).
    # capability-provider label identifies the broker; managed-by + redis_setup_type
    # discriminate operator-controlled pods and target ports. Tenant-set
    # capability-provider.* is blocked by Kyverno reserved-labels policy
    # (defense-in-depth via managed-by which the operator sets itself).
    - toEndpoints:
        - matchLabels:
            platform.io/capability-provider.redis-managed: "true"
            app.kubernetes.io/managed-by: redis-operator
            redis_setup_type: replication
        - matchLabels:
            platform.io/capability-provider.redis-managed: "true"
            app.kubernetes.io/managed-by: redis-operator
            redis_setup_type: sentinel
      toPorts:
        - ports:
            - port: "6379"
              protocol: TCP
            - port: "26379"
              protocol: TCP
