---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: case-1-external-allowed
  namespace: default
spec:
  parentRefs:
    - name: cluster-gateway
      namespace: gateway
      sectionName: external-https
  hostnames:
    - api.cluster.example.com
  rules:
    - backendRefs:
        - name: backend
          port: 80
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: case-2-external-denied
  namespace: default
spec:
  parentRefs:
    - name: cluster-gateway
      namespace: gateway
      sectionName: external-https
  hostnames:
    - leaked-internal.tenant.local
  rules:
    - backendRefs:
        - name: backend
          port: 80
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: case-3-internal-route
  namespace: default
spec:
  parentRefs:
    - name: cluster-gateway
      namespace: gateway
      sectionName: https
  hostnames:
    - internal.cluster.example.com
  rules:
    - backendRefs:
        - name: backend
          port: 80
