apiVersion: cilium.io/v2
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: pni-controlplane-egress-consumer-egress
  labels:
    app.kubernetes.io/name: platform-network-interface
    app.kubernetes.io/component: network-policy
    app.kubernetes.io/managed-by: argocd
spec:
  endpointSelector:
    matchLabels:
      k8s:io.cilium.k8s.namespace.labels.platform.io/consume.controlplane-egress: "true"
      k8s:io.cilium.k8s.namespace.labels.platform.io/network-interface-version: "v1"
      platform.io/capability-consumer.controlplane-egress: "true"
  egress:
    # Kubernetes API server — `toEntities: kube-apiserver` covers both
    # ClusterIP (pre-DNAT) and host:port (post-DNAT) under Cilium
    # kube-proxy replacement (KPR) with socketLB.enabled, which is the
    # base's bootstrap default (see kubernetes/bootstrap/cilium/values.yaml).
    #
    # The previous v0.1.0 form hardcoded the kubeadm-default service
    # ClusterIP `10.96.0.1/32` — a cluster-specific value that breaks
    # on Talos installations with a different --service-cidr (e.g.,
    # k3s-style `10.43.0.0/16`). Consumers on standard kube-proxy
    # (no KPR) must add a sibling CCNP in their overlay pinning the
    # actual service ClusterIP for their cluster.
    # See docs/oci-artifact-verification.md and CHANGELOG v0.1.1
    # BREAKING CHANGES for migration notes.
    - toEntities:
        - kube-apiserver
      toPorts:
        - ports:
            - port: "6443"
              protocol: TCP
    # DNS
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
