apiVersion: cilium.io/v2
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: pni-redis-managed-consumer-egress
  labels:
    app.kubernetes.io/name: platform-network-interface
    app.kubernetes.io/instance: homelab
    app.kubernetes.io/component: network-policy
    app.kubernetes.io/part-of: homelab
    app.kubernetes.io/managed-by: argocd
spec:
  endpointSelector:
    matchLabels:
      k8s:io.cilium.k8s.namespace.labels.platform.io/consume.redis-managed: "true"
      k8s:io.cilium.k8s.namespace.labels.platform.io/network-interface-version: "v1"
      platform.io/capability-consumer.redis-managed: "true"
  egress:
    # Redis instances (any namespace, identified by capability-provider label
    # set on the operator-managed pod template)
    - toEndpoints:
        - matchLabels:
            platform.io/capability-provider.redis-managed: "true"
      toPorts:
        - ports:
            - port: "6379"
              protocol: TCP
    # DNS
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
