apiVersion: cilium.io/v2
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: pni-gateway-backend-consumer-ingress
  labels:
    app.kubernetes.io/name: platform-network-interface
    app.kubernetes.io/component: network-policy
    app.kubernetes.io/managed-by: argocd
spec:
  endpointSelector:
    matchLabels:
      k8s:io.cilium.k8s.namespace.labels.platform.io/consume.gateway-backend: "true"
      k8s:io.cilium.k8s.namespace.labels.platform.io/network-interface-version: "v1"
      platform.io/capability-consumer.gateway-backend: "true"
  ingress:
    # Cilium Gateway API proxy (reserved:ingress identity).
    # Ports listed here MUST be platform-component container ports
    # only — never tenant-application ports. Consumer overlays that
    # ship tenant apps with custom container ports (e.g., plane.so on
    # 8000, kb-mcp on 8001) add a sibling CCNP in their own overlay.
    # See CHANGELOG v0.1.1 BREAKING CHANGES for migration notes.
    - fromEntities:
        - ingress
      toPorts:
        - ports:
            # Grafana (container port)
            - port: "3000"
              protocol: TCP
            # OAuth2-Proxy — Prometheus + Alertmanager (container port)
            - port: "4180"
              protocol: TCP
            # Dex OIDC (container port)
            - port: "5556"
              protocol: TCP
            # Vault UI (container port)
            - port: "8200"
              protocol: TCP
