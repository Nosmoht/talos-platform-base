apiVersion: cilium.io/v2
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: pni-monitoring-scrape-consumer-egress
  labels:
    app.kubernetes.io/name: platform-network-interface
    app.kubernetes.io/component: network-policy
    app.kubernetes.io/managed-by: argocd
spec:
  description: >-
    PNI: allow capability-consumer.monitoring-scrape pods (Prometheus
    today, but tool-agnostic) to reach namespaces declaring
    consume.monitoring-scrape. Source selector is capability-based —
    a Prometheus → Victoria-Metrics swap requires only relocating the
    capability-consumer label, not editing this CCNP.
  endpointSelector:
    matchLabels:
      platform.io/capability-consumer.monitoring-scrape: "true"
  egress:
    - toEndpoints:
        - matchLabels:
            k8s:io.cilium.k8s.namespace.labels.platform.io/consume.monitoring-scrape: "true"
            k8s:io.cilium.k8s.namespace.labels.platform.io/network-interface-version: "v1"
