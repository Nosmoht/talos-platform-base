apiVersion: cilium.io/v2
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: pni-rabbitmq-operator-dataplane-egress
  labels:
    app.kubernetes.io/name: platform-network-interface
    app.kubernetes.io/instance: homelab
    app.kubernetes.io/component: network-policy
    app.kubernetes.io/part-of: homelab
    app.kubernetes.io/managed-by: argocd
spec:
  endpointSelector:
    matchLabels:
      k8s:io.kubernetes.pod.namespace: rabbitmq-system
      platform.io/capability-consumer.rabbitmq-operator-dataplane: "true"
  egress:
    # Managed RabbitMQ server pods: AMQP, Erlang cluster, management, epmd, prometheus.
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: rabbitmq-system
            app.kubernetes.io/component: rabbitmq
            app.kubernetes.io/part-of: rabbitmq
      toPorts:
        - ports:
            - port: "5672"    # AMQP
              protocol: TCP
            - port: "5671"    # AMQPS
              protocol: TCP
            - port: "15672"   # Management HTTP
              protocol: TCP
            - port: "15671"   # Management HTTPS
              protocol: TCP
            - port: "15692"   # Prometheus
              protocol: TCP
            - port: "4369"    # epmd
              protocol: TCP
            - port: "25672"   # Erlang distribution / clustering
              protocol: TCP
