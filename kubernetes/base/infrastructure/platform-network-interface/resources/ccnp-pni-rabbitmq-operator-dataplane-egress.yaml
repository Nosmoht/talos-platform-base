apiVersion: cilium.io/v2
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: pni-rabbitmq-operator-dataplane-egress
  labels:
    app.kubernetes.io/name: platform-network-interface
    app.kubernetes.io/component: network-policy
    app.kubernetes.io/managed-by: argocd
spec:
  endpointSelector:
    matchLabels:
      k8s:io.kubernetes.pod.namespace: rabbitmq-system
      platform.io/capability-consumer.rabbitmq-operator-dataplane: "true"
  egress:
    # Operator → managed RabbitMQ server: HTTP management API only.
    # Operators do not speak AMQP or Erlang distribution; broker-internal Erlang
    # clustering (4369/25672) belongs in a future server↔server CCNP scoped to
    # multi-replica RabbitmqClusters, not in this operator-dataplane capability.
    - toEndpoints:
        - matchLabels:
            platform.io/capability-provider.rabbitmq-managed: "true"
      toPorts:
        - ports:
            - port: "15672"   # Management HTTP
              protocol: TCP
            - port: "15671"   # Management HTTPS
              protocol: TCP
