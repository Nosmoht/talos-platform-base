apiVersion: v1
kind: Namespace
metadata:
  name: metrics-server
  labels:
    app.kubernetes.io/name: metrics-server
    app.kubernetes.io/managed-by: argocd
    platform.io/network-interface-version: v1
    platform.io/network-profile: managed
    # metrics-server pod carries capability-provider.hpa-metrics.
    # Trust anchor — see ADR §Namespace-anchored producer trust.
    platform.io/provide.hpa-metrics: "true"
    # The metrics-server pod also exposes /metrics.
    platform.io/provide.monitoring-scrape: "true"
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/enforce-version: latest
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/audit-version: latest
    pod-security.kubernetes.io/warn: restricted
    pod-security.kubernetes.io/warn-version: latest
