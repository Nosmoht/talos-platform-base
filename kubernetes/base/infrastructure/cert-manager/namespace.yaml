apiVersion: v1
kind: Namespace
metadata:
  name: cert-manager
  labels:
    app.kubernetes.io/name: cert-manager
    app.kubernetes.io/managed-by: argocd
    platform.io/network-interface-version: v1
    platform.io/network-profile: managed
    platform.io/consume.vault-secrets: "true"
    platform.io/consume.controlplane-egress: "true"
    # cert-manager owns the source `vault-ca` Secret. Opt out of the
    # pni-vault-ca-distribution generate policy so the policy does not
    # try to clone the Secret into its own source namespace.
    platform.io/vault-ca-distribution: skip
    # cert-manager-webhook pod carries capability-provider.tls-issuance.
    # cert-manager-controller pod carries capability-provider.monitoring-scrape.
    # Trust anchors — see ADR §Namespace-anchored producer trust.
    platform.io/provide.tls-issuance: "true"
    platform.io/provide.monitoring-scrape: "true"
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/enforce-version: latest
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/audit-version: latest
    pod-security.kubernetes.io/warn: restricted
    pod-security.kubernetes.io/warn-version: latest
