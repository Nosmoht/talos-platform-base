cluster:
  allowSchedulingOnControlPlanes: true
  extraManifests:
    - https://github.com/kubernetes-sigs/gateway-api/releases/download/v1.2.1/experimental-install.yaml
    # Cache-busting: Talos caches extraManifests; changing the URL forces re-download.
    # Update the version query param when bumping CILIUM_VERSION in versions.mk.
    - https://raw.githubusercontent.com/Nosmoht/Talos-Homelab/main/kubernetes/bootstrap/cilium/cilium.yaml?v=1.19.1
  scheduler:
    extraArgs:
      bind-address: 0.0.0.0
  etcd:
    extraArgs:
      listen-metrics-urls: http://0.0.0.0:2381
