cluster:
  allowSchedulingOnControlPlanes: true
  # NOTE: extraManifests are cluster-specific — the consumer cluster repo
  # layers its own controlplane patch with the appropriate URL list (typically
  # the Gateway API CRDs and a rendered cilium.yaml that carries cluster-specific
  # Hubble TLS certificates). Do not add extraManifests here.
  scheduler:
    extraArgs:
      bind-address: 0.0.0.0
  etcd:
    extraArgs:
      listen-metrics-urls: http://0.0.0.0:2381
