machine:
  kubelet:
    extraConfig:
      registerWithTaints:
        - key: nvidia.com/gpu
          value: "present"
          effect: NoSchedule
  kernel:
    modules:
      - name: nvidia
        parameters:
          - NVreg_UsePageAttributeTable=1
      - name: nvidia_uvm
      - name: nvidia_modeset
      - name: nvidia_drm
