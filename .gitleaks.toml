# Shared gitleaks configuration — pinned for both pre-commit and CI so
# their rulesets cannot silently diverge across the project lifecycle.
#
# `useDefault = true` inherits gitleaks's bundled default rules. Add
# project-specific custom rules under [[rules]] when needed; do NOT
# disable defaults without a documented justification.

[extend]
useDefault = true

# Allowlist — files exempted from secret scanning. Each entry MUST:
#   1. Use anchored RE2 regex (^…$) and escape `.` so the entry does
#      not over-match (e.g. `\.toml` not `.toml`).
#   2. Be a test fixture that does NOT contain real-shaped tokens.
#      Use placeholder values like `PLACEHOLDER_NOT_A_REAL_TOKEN`.
#   3. Carry a short justification.
#
# This list is intentionally minimal.
[allowlist]
paths = [
  '''^scripts/test/codex-leak\.toml$''',   # placeholder values only — see scripts/check-codex-config-placeholders.sh tests
  # Kyverno-cli unit-test fixtures may include Kubernetes Secret manifests
  # with base64-encoded PLACEHOLDER values (e.g. `fake-for-test-only`).
  # Gitleaks's `kubernetes-secret-yaml` rule flags the literal Secret kind;
  # the placeholder data does NOT contain real-shaped tokens and is
  # documented inline.
  '''^kubernetes/base/infrastructure/platform-network-interface/resources/tests/[^/]+/resources\.yaml$''',

  # Phase B rendered-manifests outputs that include a Helm-rendered
  # `kind: Secret` whose `data.<key>` is *configuration*, not a credential.
  # gitleaks `detect` walks the full git history (fetch-depth: 0), so
  # these files surface even on PRs that don't directly modify them
  # (e.g. PR #24 chore/tool-pinning sees them via the merged-base graph
  # while PR #26 introduces them).
  # Real credential Secrets are ESO-provisioned (Phase A) and never
  # appear in the rendered tree.
  #
  # dex/_rendered/manifests.yaml — Secret `dex` carries `data.config.yaml`
  #   = base64(dex runtime config: oauth2.skipApprovalScreen, storage.type).
  # kube-prometheus-stack/_rendered/manifests.yaml — Secret
  #   `alertmanager-kube-prometheus-stack-alertmanager` carries
  #   `data.alertmanager.yaml` = base64(alertmanager routing config).
  '''^kubernetes/base/infrastructure/dex/_rendered/manifests\.yaml$''',
  '''^kubernetes/base/infrastructure/kube-prometheus-stack/_rendered/manifests\.yaml$''',
]
